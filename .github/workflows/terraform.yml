name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'aws-deploy-infra/**'
  pull_request:
    branches: [main]
    paths:
      - 'aws-deploy-infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws-deploy-infra/terraform/envs/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
        env:
          TF_VAR_aws_account_id:      ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_github_org:          eriiinxxuu
          TF_VAR_github_repo:         realtime-fraud-detection-pipeline
          TF_VAR_tf_state_bucket:     frauddetection-tf-state-235695894568
          TF_VAR_db_master_password:  ${{ secrets.TF_VAR_db_master_password }}
          TF_VAR_airflow_db_password: ${{ secrets.TF_VAR_airflow_db_password }}
          TF_VAR_mlflow_db_password:  ${{ secrets.TF_VAR_mlflow_db_password }}
          TF_VAR_airflow_jwt_secret:  ${{ secrets.TF_VAR_airflow_jwt_secret }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
        env:
          TF_VAR_aws_account_id:      ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_github_org:          eriiinxxuu
          TF_VAR_github_repo:         realtime-fraud-detection-pipeline
          TF_VAR_tf_state_bucket:     frauddetection-tf-state-235695894568
          TF_VAR_db_master_password:  ${{ secrets.TF_VAR_db_master_password }}
          TF_VAR_airflow_db_password: ${{ secrets.TF_VAR_airflow_db_password }}
          TF_VAR_mlflow_db_password:  ${{ secrets.TF_VAR_mlflow_db_password }}
          TF_VAR_airflow_jwt_secret:  ${{ secrets.TF_VAR_airflow_jwt_secret }}